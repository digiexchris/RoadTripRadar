name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version name (e.g. 1.2.0)'
        required: true
      changelog:
        description: 'Changelog / release notes for this version'
        required: true
      prerelease:
        description: 'Mark as pre-release (e.g. for RC builds)'
        type: boolean
        default: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Calculate versionCode
        run: |
          CURRENT=$(git tag --list 'v*' | wc -l)
          CODE=$((CURRENT + 1))
          echo "VERSION_CODE=$CODE" >> $GITHUB_ENV
          echo "VERSION_NAME=${{ github.event.inputs.version }}" >> $GITHUB_ENV

      - name: Update build.gradle.kts
        run: |
          sed -i "s/versionCode = [0-9]*/versionCode = $VERSION_CODE/" app/build.gradle.kts
          sed -i "s/versionName = \"[^\"]*\"/versionName = \"$VERSION_NAME\"/" app/build.gradle.kts

      - name: Create Fastlane changelog
        run: |
          mkdir -p fastlane/metadata/android/en-US/changelogs
          printf '%s\n' "${{ github.event.inputs.changelog }}" \
            > "fastlane/metadata/android/en-US/changelogs/${VERSION_CODE}.txt"

      - name: Commit and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app/build.gradle.kts fastlane/
          git commit -m "Release v${VERSION_NAME}"
          git tag "v${VERSION_NAME}"
          git push origin ${{ github.ref_name }} --tags

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > keystore.jks

      - name: Build signed APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease

      - name: Rename APK
        run: |
          cd app/build/outputs/apk/release
          mv *.apk "RoadTripRadar-v${VERSION_NAME}.apk"

      - name: Create GitHub Release with APK
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PRERELEASE_FLAG=""
          if [ "${{ github.event.inputs.prerelease }}" = "true" ]; then
            PRERELEASE_FLAG="--prerelease"
          fi
          gh release create "v${VERSION_NAME}" \
            --title "v${VERSION_NAME}" \
            --notes "${{ github.event.inputs.changelog }}" \
            $PRERELEASE_FLAG \
            app/build/outputs/apk/release/*.apk
