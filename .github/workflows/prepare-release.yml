name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version name (e.g. 1.2.0)"
        required: true
      changelog:
        description: "Changelog / release notes for this version (ignored for rebuild)"
        required: false
        default: ""
      prerelease:
        description: "Mark as pre-release (e.g. for RC builds)"
        type: boolean
        default: false
      rebuild_only:
        description: "Rebuild and re-sign only (skip version bump, reuse existing tag/release)"
        type: boolean
        default: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate inputs
        if: ${{ github.event.inputs.rebuild_only != 'true' && github.event.inputs.changelog == '' }}
        run: |
          echo "::error::Changelog is required for new releases"
          exit 1

      - name: Calculate versionCode
        if: ${{ github.event.inputs.rebuild_only != 'true' }}
        run: |
          CURRENT=$(git tag --list 'v*' | wc -l)
          CODE=$((CURRENT + 1))
          echo "VERSION_CODE=$CODE" >> $GITHUB_ENV
          echo "VERSION_NAME=${{ github.event.inputs.version }}" >> $GITHUB_ENV

      - name: Read existing version for rebuild
        if: ${{ github.event.inputs.rebuild_only == 'true' }}
        run: |
          VERSION_NAME="${{ github.event.inputs.version }}"
          VERSION_CODE=$(grep 'versionCode' app/build.gradle.kts | head -1 | sed 's/[^0-9]//g')
          echo "VERSION_CODE=$VERSION_CODE" >> $GITHUB_ENV
          echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_ENV

      - name: Update build.gradle.kts
        if: ${{ github.event.inputs.rebuild_only != 'true' }}
        run: |
          sed -i "s/versionCode = [0-9]*/versionCode = $VERSION_CODE/" app/build.gradle.kts
          sed -i "s/versionName = \"[^\"]*\"/versionName = \"$VERSION_NAME\"/" app/build.gradle.kts

      - name: Create Fastlane changelog
        if: ${{ github.event.inputs.rebuild_only != 'true' }}
        run: |
          mkdir -p fastlane/metadata/android/en-US/changelogs
          printf '%s\n' "${{ github.event.inputs.changelog }}" \
            > "fastlane/metadata/android/en-US/changelogs/${VERSION_CODE}.txt"

      - name: Commit and tag
        if: ${{ github.event.inputs.rebuild_only != 'true' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app/build.gradle.kts fastlane/
          git commit -m "Release v${VERSION_NAME}"
          git tag "v${VERSION_NAME}"
          git push origin ${{ github.ref_name }} --tags

      - name: Checkout tag for rebuild
        if: ${{ github.event.inputs.rebuild_only == 'true' }}
        run: git checkout "v${VERSION_NAME}"

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > keystore.jks

      - name: Build unsigned APK
        run: ./gradlew assembleRelease --no-configuration-cache

      - name: Build unsigned AAB
        run: ./gradlew bundleRelease --no-configuration-cache

      - name: Upload unsigned APK for reproducibility comparison
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-apk
          path: app/build/outputs/apk/release/*.apk
          retention-days: 90

      - name: Install build-tools 34
        run: yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" "build-tools;34.0.0" || true

      - name: Sign APK with apksigner
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          APKSIGNER="$ANDROID_HOME/build-tools/34.0.0/apksigner"
          UNSIGNED_APK=$(find app/build/outputs/apk/release -name '*.apk' | head -1)
          "$APKSIGNER" sign \
            --ks keystore.jks \
            --ks-key-alias "$KEY_ALIAS" \
            --ks-pass "pass:$KEYSTORE_PASSWORD" \
            --key-pass "pass:$KEY_PASSWORD" \
            "$UNSIGNED_APK"

      - name: Verify APK signature
        run: |
          APKSIGNER="$ANDROID_HOME/build-tools/34.0.0/apksigner"
          SIGNED_APK=$(find app/build/outputs/apk/release -name '*.apk' | head -1)
          "$APKSIGNER" verify --print-certs "$SIGNED_APK"

      - name: Sign AAB with jarsigner
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          UNSIGNED_AAB=$(find app/build/outputs/bundle/release -name '*.aab' | head -1)
          jarsigner -verbose -sigalg SHA256withRSA -digestalg SHA-256 \
            -keystore keystore.jks \
            -storepass "$KEYSTORE_PASSWORD" \
            -keypass "$KEY_PASSWORD" \
            "$UNSIGNED_AAB" \
            "$KEY_ALIAS"

      - name: Rename APK and AAB
        run: |
          cd app/build/outputs/apk/release
          mv *.apk "RoadTripRadar-v${VERSION_NAME}.apk"
          cd ../../../bundle/release
          mv *.aab "RoadTripRadar-v${VERSION_NAME}.aab"

      - name: Create or update GitHub Release with APK
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="v${VERSION_NAME}"
          APK_PATH="app/build/outputs/apk/release/RoadTripRadar-v${VERSION_NAME}.apk"
          AAB_PATH="app/build/outputs/bundle/release/RoadTripRadar-v${VERSION_NAME}.aab"

          if [ "${{ github.event.inputs.rebuild_only }}" = "true" ]; then
            # Delete existing assets and upload replacements
            gh release delete-asset "$TAG" "RoadTripRadar-v${VERSION_NAME}.apk" --yes 2>/dev/null || true
            gh release delete-asset "$TAG" "RoadTripRadar-v${VERSION_NAME}.aab" --yes 2>/dev/null || true
            gh release upload "$TAG" "$APK_PATH" "$AAB_PATH"
          else
            PRERELEASE_FLAG=""
            if [ "${{ github.event.inputs.prerelease }}" = "true" ]; then
              PRERELEASE_FLAG="--prerelease"
            fi
            gh release create "$TAG" \
              --title "$TAG" \
              --notes "${{ github.event.inputs.changelog }}" \
              $PRERELEASE_FLAG \
              "$APK_PATH" "$AAB_PATH"
          fi
