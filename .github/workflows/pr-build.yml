name: PR Build

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    environment: pr-build
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Build and sign
        uses: ./.github/actions/build-sign
        with:
          keystore_base64: ${{ secrets.KEYSTORE_BASE64 }}
          keystore_password: ${{ secrets.KEYSTORE_PASSWORD }}
          key_alias: ${{ secrets.KEY_ALIAS }}
          key_password: ${{ secrets.KEY_PASSWORD }}

      - name: Rename artifacts for PR
        run: |
          PR_NUM=${{ github.event.pull_request.number }}
          mv app/build/outputs/apk/release/*.apk "app/build/outputs/apk/release/RoadTripRadar-PR-${PR_NUM}.apk"
          mv app/build/outputs/bundle/release/*.aab "app/build/outputs/bundle/release/RoadTripRadar-PR-${PR_NUM}.aab"

      - name: Upload signed APK
        uses: actions/upload-artifact@v4
        with:
          name: signed-apk
          path: app/build/outputs/apk/release/*.apk
          retention-days: 90

      - name: Upload signed AAB
        uses: actions/upload-artifact@v4
        with:
          name: signed-aab
          path: app/build/outputs/bundle/release/*.aab
          retention-days: 90

      - name: Comment on PR with artifact link
        uses: actions/github-script@v7
        with:
          script: |
            const body = [
              '<!-- pr-build-comment -->',
              '### PR Build',
              `[Download artifacts](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
              '',
              `Built from commit \`${context.sha.substring(0, 7)}\``
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number
            });

            const existing = comments.find(
              c => c.user.login === 'github-actions[bot]' && c.body.includes('<!-- pr-build-comment -->')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body
              });
            }
